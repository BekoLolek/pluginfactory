# SSL Configuration for BekoLolek Plugin Factory
# ================================================
# To enable SSL:
# 1. Obtain certificates (e.g., via Let's Encrypt / certbot)
# 2. Uncomment the configuration below
# 3. Update paths to match your certificate locations
# 4. Uncomment the SSL include in nginx.conf
# 5. Mount the certificate volume in docker-compose.yml

# listen 443 ssl http2;
# server_name pluginfactory.bekololek.com;

# # Certificate files
# ssl_certificate /etc/nginx/ssl/fullchain.pem;
# ssl_certificate_key /etc/nginx/ssl/privkey.pem;

# # SSL protocols and ciphers (modern configuration)
# ssl_protocols TLSv1.2 TLSv1.3;
# ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
# ssl_prefer_server_ciphers off;

# # SSL session settings
# ssl_session_timeout 1d;
# ssl_session_cache shared:SSL:10m;
# ssl_session_tickets off;

# # OCSP Stapling
# ssl_stapling on;
# ssl_stapling_verify on;
# resolver 8.8.8.8 8.8.4.4 valid=300s;
# resolver_timeout 5s;

