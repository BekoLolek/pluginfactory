global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: pluginfactory-api
    metrics_path: /actuator/prometheus
    scheme: http
    static_configs:
      - targets:
          - api:8080
        labels:
          application: pluginfactory
          environment: production

  - job_name: prometheus
    metrics_path: /metrics
    static_configs:
      - targets:
          - localhost:9090
