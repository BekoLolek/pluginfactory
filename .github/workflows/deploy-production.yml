name: Deploy Production

on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run tests
        run: cd api && ./mvnw clean verify -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.PRODUCTION_HOST_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to production
        env:
          DEPLOY_HOST: ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST_IP }}
          DEPLOY_BRANCH: ${{ github.event.release.tag_name }}
        run: |
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          chmod +x infra/scripts/deploy.sh
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          # Copy deploy script to remote
          scp -i ~/.ssh/deploy_key infra/scripts/deploy.sh "$DEPLOY_HOST:/tmp/deploy.sh"

          # Run deploy on remote
          $SSH_CMD "$DEPLOY_HOST" "
            export DEPLOY_DIR=${DEPLOY_DIR:-/opt/pluginfactory}
            export DEPLOY_BRANCH=$DEPLOY_BRANCH
            export HEALTH_URL=http://localhost:8080/actuator/health
            cd \$DEPLOY_DIR &&
            git fetch --tags origin &&
            git checkout $DEPLOY_BRANCH &&
            docker compose build --no-cache &&
            docker compose up -d --remove-orphans
          "

      - name: Verify deployment health
        env:
          DEPLOY_HOST: ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST_IP }}
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          for i in $(seq 1 24); do
            STATUS=$($SSH_CMD "$DEPLOY_HOST" "curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/actuator/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed after $((i * 5))s"
              exit 0
            fi
            echo "Waiting... ($((i * 5))s elapsed, HTTP status: $STATUS)"
            sleep 5
          done
          echo "Health check failed after 120s"
          exit 1

      - name: Discord notification
        if: always()
        env:
          DEPLOY_STATUS: ${{ job.status }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ -n "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            if [ "$DEPLOY_STATUS" = "success" ]; then
              EMOJI="✅"
              COLOR=3066993
            else
              EMOJI="❌"
              COLOR=15158332
            fi
            curl -s -H "Content-Type: application/json" \
              -d "{\"embeds\":[{\"title\":\"${EMOJI} Production Deploy: ${DEPLOY_STATUS}\",\"description\":\"Release \`${RELEASE_TAG}\` deployment ${DEPLOY_STATUS}.\",\"color\":${COLOR},\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}]}" \
              "${{ secrets.DISCORD_WEBHOOK_URL }}" || true
          fi

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
