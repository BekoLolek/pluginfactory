name: Deploy Staging

on:
  push:
    branches: [develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run tests
        run: cd api && ./mvnw clean verify -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.STAGING_HOST_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to staging
        env:
          DEPLOY_HOST: ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST_IP }}
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          $SSH_CMD "$DEPLOY_HOST" "
            cd /opt/pluginfactory &&
            git fetch origin &&
            git checkout develop &&
            git pull origin develop &&
            docker compose build --no-cache &&
            docker compose up -d --remove-orphans
          "

      - name: Verify deployment health
        env:
          DEPLOY_HOST: ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST_IP }}
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          for i in $(seq 1 24); do
            STATUS=$($SSH_CMD "$DEPLOY_HOST" "curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/actuator/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed after $((i * 5))s"
              exit 0
            fi
            echo "Waiting... ($((i * 5))s elapsed, HTTP status: $STATUS)"
            sleep 5
          done
          echo "Health check failed after 120s"
          exit 1

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
