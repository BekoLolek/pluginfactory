name: Security Scan

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday
  pull_request:
    branches: [main]

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: OWASP Dependency Check
        run: cd api && ./mvnw org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=9 || true
      - name: npm audit
        run: cd web && npm audit --audit-level=high || true
