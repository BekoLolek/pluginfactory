<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Message from Plugin Factory</title>
</head>
<body style="margin:0;padding:0;background:#f4f4f5;font-family:'Segoe UI',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f5;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);">

          <!-- Header -->
          <tr>
            <td style="background:#18181b;padding:28px 40px;">
              <span style="font-size:18px;font-weight:700;color:#ffffff;letter-spacing:-0.3px;">Plugin Factory</span>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:36px 40px 28px;">
              <p style="margin:0 0 24px;font-size:15px;color:#3f3f46;line-height:1.7;white-space:pre-line;"
                 th:text="${customMessage}"></p>
              <p style="margin:0;font-size:15px;color:#3f3f46;line-height:1.7;">
                Best,<br/>
                <strong>Plugin Factory</strong>
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#fafafa;border-top:1px solid #e4e4e7;padding:20px 40px;">
              <p style="margin:0 0 6px;font-size:12px;color:#a1a1aa;">
                You&apos;re receiving this because you have an account at Plugin Factory.
              </p>
              <p th:if="${discordUrl != null and !#strings.isEmpty(discordUrl)}" style="margin:0;font-size:12px;color:#a1a1aa;">
                Need help?
                <a th:href="${discordUrl}" style="color:#6366f1;text-decoration:none;">Join our Discord</a> &mdash; we&apos;re happy to help.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
