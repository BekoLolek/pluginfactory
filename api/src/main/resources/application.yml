server:
  port: 8080

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized

resilience4j:
  circuitbreaker:
    instances:
      anthropic:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      anthropic:
        maxAttempts: 3
        waitDuration: 2s
        retryExceptions:
          - org.springframework.web.client.ResourceAccessException
          - java.net.SocketTimeoutException
  ratelimiter:
    instances:
      auth:
        limitForPeriod: 10
        limitRefreshPeriod: 60s
        timeoutDuration: 0s
      chat:
        limitForPeriod: 30
        limitRefreshPeriod: 60s
        timeoutDuration: 0s

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:pluginfactory;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  flyway:
    locations: classpath:db/migration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

jwt:
  secret: dev-secret-key-at-least-256-bits-long-for-hs256-algorithm-replace-in-prod
  access-expiry: 900000
  refresh-expiry: 604800000

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}

stripe:
  api-key: ${STRIPE_API_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}

discord:
  client-id: ${DISCORD_CLIENT_ID:dev-client-id}
  client-secret: ${DISCORD_CLIENT_SECRET:dev-client-secret}
  redirect-uri: ${DISCORD_REDIRECT_URI:http://localhost:5173/auth/callback}

docker:
  host: ${DOCKER_HOST:unix:///var/run/docker.sock}
  build-image: pluginfactory-build:latest
  test-image: pluginfactory-test:latest

cors:
  allowed-origins: http://localhost:5173

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
  flyway:
    locations: classpath:db/migration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  h2:
    console:
      enabled: false

jwt:
  secret: ${JWT_SECRET}
  access-expiry: ${JWT_ACCESS_EXPIRY:900000}
  refresh-expiry: ${JWT_REFRESH_EXPIRY:604800000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

app:
  base-url: ${APP_BASE_URL:https://pluginfactory.bekololek.com}

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}

stripe:
  api-key: ${STRIPE_API_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}

discord:
  client-id: ${DISCORD_CLIENT_ID}
  client-secret: ${DISCORD_CLIENT_SECRET}
  redirect-uri: ${DISCORD_REDIRECT_URI}

docker:
  host: ${DOCKER_HOST:unix:///var/run/docker.sock}
  build-image: ${DOCKER_BUILD_IMAGE:pluginfactory-build:latest}
  test-image: ${DOCKER_TEST_IMAGE:pluginfactory-test:latest}

server:
  max-http-request-header-size: 16KB
  tomcat:
    max-http-form-post-size: 2MB
    max-swallow-size: 2MB
