version: "3.9"

# Development overrides - use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: build
    ports:
      - "8080:8080"
      - "5005:5005"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DATABASE_URL: jdbc:postgresql://postgres:5432/pluginfactory?user=pluginfactory&password=pluginfactory
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-secret-key-at-least-256-bits-long-for-hs256-algorithm-replace-in-prod
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_BASIC: ${STRIPE_PRICE_BASIC:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_TEAM: ${STRIPE_PRICE_TEAM:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-dev-client-id}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-dev-client-secret}
      DISCORD_REDIRECT_URI: http://localhost:5173/auth/callback
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      DOCKER_HOST: unix:///var/run/docker.sock
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    volumes:
      - ./api/src:/app/src:ro
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  postgres:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pluginfactory
      POSTGRES_USER: pluginfactory
      POSTGRES_PASSWORD: pluginfactory

  redis:
    ports:
      - "6379:6379"

  nginx:
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
